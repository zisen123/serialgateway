# serial-gateway.yaml
gateway:
  http_port: 18080

serial_defaults:
  baudrate: 115200
  timeout: 5s
  bytesize: 8
  parity: "N"
  stopbits: 1
  write_timeout: 10s

ring_buffer:
  max_lines: 100000
  max_bytes: 10485760

ssh:
  base_port: 2200
  auth:
    type: "password"

reconnect:
  initial_interval: 1s
  max_interval: 30s
  discard_input_on_disconnect: true

reverse_tunnel:
  host: "172.25.4.7"
  port: 22
  user: "yicong.wu"
  private_key_file: "C:/Users/yicong.wu/.ssh/id_ed25519"
  remote_port: 18999
  local_port: 18080

adb:
  adb_path: "adb"
  base_port: 2300
  write_timeout: 10s

ports:
  - device: "COM3"
    baudrate: 115200
  - device: "COM25"
    baudrate: 115200
  - device: "0123456789"
    type: "adb"